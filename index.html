<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7cb342">
<title>こんだてBOX｜自動献立 &amp; 買い物リスト</title>
<style>
  :root{
    --green:#7cb342; --green-d:#558b2f; --green-l:#f1f8e9;
    --orange:#ff8f00; --red:#e53935; --ink:#33312e; --sub:#8a877f;
    --card:#ffffff; --bg:#f6f5f0; --line:#e8e6df;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));}
  header{background:linear-gradient(135deg,#8bc34a,#558b2f);color:#fff;
    padding:calc(14px + env(safe-area-inset-top)) 18px 14px;position:sticky;top:0;z-index:20;
    box-shadow:0 2px 8px rgba(0,0,0,.12)}
  header h1{font-size:19px;letter-spacing:.04em}
  header p{font-size:11.5px;opacity:.92;margin-top:2px}
  .wrap{max-width:560px;margin:0 auto;padding:14px 14px 0}
  .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;
    box-shadow:0 1px 4px rgba(60,55,40,.07)}
  /* ---- controls ---- */
  .ctrl-row{display:flex;gap:10px}
  .ctrl{flex:1;background:var(--green-l);border-radius:12px;padding:10px 12px;text-align:center}
  .ctrl label{font-size:12px;color:var(--green-d);font-weight:700;display:block}
  .stepper{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px}
  .stepper button{width:38px;height:38px;border:none;border-radius:50%;background:#fff;
    color:var(--green-d);font-size:22px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.12);
    cursor:pointer;line-height:1}
  .stepper button:active{transform:scale(.92)}
  .stepper .val{font-size:22px;font-weight:800;min-width:52px;color:var(--ink)}
  .stepper .val small{font-size:12px;font-weight:600;color:var(--sub)}
  .gen-btn{width:100%;margin-top:12px;padding:15px;border:none;border-radius:14px;
    background:linear-gradient(135deg,#ffa726,#f57c00);color:#fff;font-size:17px;font-weight:800;
    letter-spacing:.06em;box-shadow:0 3px 10px rgba(245,124,0,.35);cursor:pointer}
  .gen-btn:active{transform:scale(.98)}
  /* ---- tabs ---- */
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);
    display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;border:none;background:none;padding:10px 0 8px;font-size:11px;color:var(--sub);
    cursor:pointer;font-weight:600}
  nav button .ico{display:block;font-size:22px;margin-bottom:1px}
  nav button.on{color:var(--green-d)}
  nav button .badge{position:relative}
  nav button .badge em{position:absolute;top:-4px;right:-14px;background:var(--red);color:#fff;
    font-size:10px;font-style:normal;border-radius:9px;padding:1px 5px;font-weight:700}
  .page{display:none}.page.on{display:block}
  /* ---- day cards ---- */
  .day-card{position:relative}
  .day-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .day-num{background:var(--green);color:#fff;font-weight:800;font-size:12px;border-radius:8px;
    padding:3px 9px;letter-spacing:.05em}
  .ptag{font-size:11px;font-weight:700;border-radius:8px;padding:3px 8px;background:#fff3e0;color:#e65100}
  .balance{margin-left:auto;font-size:12px;font-weight:800;border-radius:10px;padding:3px 10px}
  .b2{background:#e8f5e9;color:#2e7d32}.b1{background:#fff8e1;color:#ef6c00}.b0{background:#ffebee;color:#c62828}
  .menu-main{font-size:16.5px;font-weight:800;line-height:1.4}
  .menu-side{font-size:13.5px;color:var(--sub);margin-top:2px}
  .nutri{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{font-size:11px;background:var(--bg);border-radius:8px;padding:3px 8px;color:#5d5a52}
  .chip b{color:var(--ink)}
  .ing-toggle{margin-top:10px;font-size:12.5px;color:var(--green-d);font-weight:700;
    background:none;border:none;cursor:pointer;padding:0}
  .ing-list{display:none;margin-top:8px;font-size:13px;color:#5d5a52;background:var(--green-l);
    border-radius:10px;padding:10px 12px}
  .ing-list.on{display:block}
  .ing-list li{list-style:none;display:flex;justify-content:space-between;padding:2px 0}
  .ing-list .ssn{margin-top:6px;font-size:12px;color:var(--sub)}
  .ttag{font-size:11px;font-weight:700;border-radius:8px;padding:3px 8px;background:#e3f2fd;color:#1565c0}
  .steps-title{font-size:12.5px;font-weight:800;color:var(--green-d);margin:10px 0 4px;
    padding-top:8px;border-top:1px dashed #cddcb8}
  .steps{counter-reset:stp}
  .steps li{list-style:none;display:flex;justify-content:flex-start;align-items:flex-start;gap:7px;padding:4px 0;font-size:12.5px;line-height:1.5}
  .steps li::before{counter-increment:stp;content:counter(stp);flex:none;width:18px;height:18px;
    border-radius:50%;background:#fff;border:1.5px solid var(--green);color:var(--green-d);
    font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .stag{flex:none;font-size:10px;font-weight:800;border-radius:6px;padding:1px 6px;margin-top:2.5px}
  .stag-p{background:#eceae3;color:#6d6a60}
  .stag-s{background:#e8f5e9;color:#2e7d32}
  .stag-m{background:#fff3e0;color:#e65100}
  .stag-f{background:#e3f2fd;color:#1565c0}
  .swap{position:absolute;top:14px;right:14px;border:1px solid var(--line);background:#fff;
    border-radius:10px;font-size:12px;padding:6px 10px;color:var(--green-d);font-weight:700;cursor:pointer}
  .swap:active{transform:rotate(180deg)}
  /* ---- summary ---- */
  .sum-title{font-size:14px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .pfc-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:8px 0 4px}
  .pfc-bar div{height:100%}
  .pfc-p{background:#ef5350}.pfc-f{background:#ffca28}.pfc-c{background:#66bb6a}
  .pfc-legend{display:flex;gap:12px;font-size:11px;color:var(--sub)}
  .pfc-legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:3px}
  .sum-note{font-size:12.5px;margin-top:10px;background:var(--green-l);border-radius:10px;
    padding:10px 12px;color:#41662a}
  /* ---- shopping ---- */
  .shop-head{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
  .shop-head h2{font-size:16px;font-weight:800}
  .shop-head span{font-size:12px;color:var(--sub)}
  .prog{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin:8px 0 2px}
  .prog div{height:100%;background:var(--green);transition:width .25s}
  .cat-title{font-size:13px;font-weight:800;color:var(--green-d);margin:14px 0 4px;
    display:flex;align-items:center;gap:6px}
  .item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px dashed var(--line)}
  .item:last-child{border-bottom:none}
  .item input{width:22px;height:22px;accent-color:var(--green);flex:none}
  .item .nm{flex:1;font-weight:600}
  .item .nm small{display:block;font-weight:400;font-size:11px;color:var(--sub)}
  .item .qt{font-weight:800;color:var(--ink);text-align:right;font-size:14px}
  .item .qt small{display:block;font-weight:400;font-size:10.5px;color:var(--sub)}
  .item.done .nm,.item.done .qt{text-decoration:line-through;color:#bbb}
  .home-note{font-size:12.5px;background:#fffde7;border:1px solid #fff59d;border-radius:10px;
    padding:10px 12px;margin-top:12px;color:#795548}
  .empty{padding:48px 16px;text-align:center;color:var(--sub);font-size:14px}
  .empty .big{font-size:44px;margin-bottom:10px}
  .copy-btn{width:100%;margin-top:12px;padding:12px;border:1.5px solid var(--green);border-radius:12px;
    background:#fff;color:var(--green-d);font-weight:800;font-size:14px;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(40,40,36,.92);
    color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;transition:opacity .25s;
    pointer-events:none;z-index:50;white-space:nowrap}
  .toast.on{opacity:1}
</style>
</head>
<body>
<header>
  <h1>こんだてBOX</h1>
  <p>夕食の献立を自動作成 → 買い物リストまで一気に</p>
</header>

<div class="wrap">
  <!-- 設定 -->
  <div class="card" id="ctrlCard">
    <div class="ctrl-row">
      <div class="ctrl">
        <label>人数</label>
        <div class="stepper">
          <button onclick="chg('people',-1)">−</button>
          <div class="val"><span id="vPeople">2</span><small> 人</small></div>
          <button onclick="chg('people',1)">＋</button>
        </div>
      </div>
      <div class="ctrl">
        <label>まとめ買い</label>
        <div class="stepper">
          <button onclick="chg('days',-1)">−</button>
          <div class="val"><span id="vDays">5</span><small> 食分</small></div>
          <button onclick="chg('days',1)">＋</button>
        </div>
      </div>
    </div>
    <button class="gen-btn" onclick="generate()">献立を作成する</button>
  </div>

  <!-- 献立ページ -->
  <div class="page on" id="pagePlan">
    <div id="planArea">
      <div class="empty"><div class="big">🍳</div>人数とまとめ買いの食数を選んで<br>「献立を作成する」を押してください</div>
    </div>
  </div>

  <!-- 買い物リストページ -->
  <div class="page" id="pageShop">
    <div id="shopArea">
      <div class="empty"><div class="big">🛒</div>献立を作成すると<br>買い物リストが自動でできます</div>
    </div>
  </div>
</div>

<nav>
  <button class="on" id="tabPlan" onclick="showTab('Plan')"><span class="ico">📅</span>献立</button>
  <button id="tabShop" onclick="showTab('Shop')"><span class="ico badge">🛒<em id="shopBadge" style="display:none"></em></span>買い物リスト</button>
</nav>
<div class="toast" id="toast"></div>

/* =====================================================
   献立生成ロジック
===================================================== */
function pickPlan(days, prevPlan){
  const pool=[...RECIPES.keys()];
  // シャッフル
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  const plan=[];
  const protCount={};
  for(let d=0;d<days;d++){
    let best=-1,bestScore=-1e9;
    for(const idx of pool){
      if(plan.includes(idx))continue;
      const r=RECIPES[idx];
      let s=Math.random()*2;
      // 直前と同じたんぱく源は避ける
      if(plan.length&&RECIPES[plan[plan.length-1]].protein===r.protein)s-=20;
      // 同じたんぱく源の回数が偏らないように
      s-=(protCount[r.protein]||0)*6;
      // 期間内に魚を入れるボーナス
      if(days>=4&&r.protein==="魚"&&!(protCount["魚"]))s+=4;
      // 食材の使い回し(まとめ買いのムダ削減)ボーナス
      const used=new Set();plan.forEach(p=>RECIPES[p].ing.forEach(([n,g])=>{if(g>0)used.add(n);}));
      r.ing.forEach(([n,g])=>{const m=ING[n];if(g>0&&m&&m.unit!=="g"&&m.unit!=="ml"&&used.has(n))s+=2;});
      // 野菜が少ない週にならないように
      if(r.n[5]>=150)s+=1.5;
      if(s>bestScore){bestScore=s;best=idx;}
    }
    plan.push(best);
    protCount[RECIPES[best].protein]=(protCount[RECIPES[best].protein]||0)+1;
  }
  return plan;
}

function swapDay(plan, dayIdx){
  const cur=plan[dayIdx];
  const cand=[...RECIPES.keys()].filter(i=>!plan.includes(i));
  const prev=dayIdx>0?RECIPES[plan[dayIdx-1]].protein:null;
  const next=dayIdx<plan.length-1?RECIPES[plan[dayIdx+1]].protein:null;
  let good=cand.filter(i=>RECIPES[i].protein!==prev&&RECIPES[i].protein!==next);
  if(!good.length)good=cand;
  if(!good.length)return cur;
  return good[Math.floor(Math.random()*good.length)];
}

/* ---- 栄養バランス判定(1人前・夕食・ごはん抜き) ----
   ごはん普通盛り(約240kcal,炭水化物56g)を足す前提で判定 */
function judgeDay(n){
  const [kcal,p,f,c,salt,veg]=n;
  let score=2; const notes=[];
  if(p>=22);else if(p>=18){score=Math.min(score,1);notes.push("たんぱく質やや少なめ");}
  else{score=0;notes.push("たんぱく質不足");}
  if(veg>=120);else if(veg>=80){score=Math.min(score,1);notes.push("野菜をもう一品");}
  else{score=0;notes.push("野菜不足");}
  if(salt<=2.5);else if(salt<=3.2){score=Math.min(score,1);notes.push("塩分やや高め");}
  else{score=0;notes.push("塩分高め");}
  if(kcal>=330&&kcal<=560);else{score=Math.min(score,1);notes.push(kcal<330?"カロリー控えめ":"カロリー高め");}
  return {score,notes};
}
const BLABEL=["△ 見直し","○ まずまず","◎ バランス良好"];

function weekSummary(plan){
  const t=[0,0,0,0,0,0];
  plan.forEach(i=>RECIPES[i].n.forEach((v,k)=>t[k]+=v));
  const d=plan.length;
  const avg=t.map(v=>v/d);
  const pe=avg[1]*4, fe=avg[2]*9, ce=avg[3]*4, tot=pe+fe+ce;
  return {avg, pfc:[pe/tot*100, fe/tot*100, ce/tot*100]};
}

/* ---- 買い物リスト集計 ---- */
function buildShopping(plan, people){
  const need={}; const ssn=new Set();
  plan.forEach(i=>{
    RECIPES[i].ing.forEach(([name,g])=>{
      if(g<=0)return;
      need[name]=(need[name]||0)+g*people;
    });
    RECIPES[i].ssn.forEach(s=>ssn.add(s));
  });
  const cats={"野菜":[],"きのこ・海藻":[],"肉・魚":[],"卵・豆腐・乳":[],"その他":[]};
  Object.entries(need).forEach(([name,g])=>{
    const m=ING[name]; if(!m)return;
    let qty,sub,leftover=0;
    if(m.unit==="g"||m.unit==="ml"){
      qty=Math.ceil(g/10)*10+m.unit; sub="";
    }else{
      const units=Math.ceil(g/m.per - 0.0001);
      qty=units+m.unit;
      sub="必要量 約"+Math.round(g)+"g";
      leftover=units*m.per-g;
    }
    cats[m.cat].push({name,qty,sub,leftover,g});
  });
  Object.values(cats).forEach(a=>a.sort((x,y)=>y.g-x.g));
  return {cats, ssn:[...ssn].sort()};
}

// ---- UI ----
const state={people:2, days:5, plan:null, checked:{}, openIng:{}};

function chg(key,delta){
  const lim=key==="people"?[1,8]:[2,7];
  state[key]=Math.min(lim[1],Math.max(lim[0],state[key]+delta));
  document.getElementById(key==="people"?"vPeople":"vDays").textContent=state[key];
  if(state.plan){
    if(key==="days"){generate();}
    else{renderShop();}
  }
}

function generate(){
  state.plan=pickPlan(state.days);
  state.checked={}; state.openIng={};
  renderPlan(); renderShop();
  showTab("Plan");
  toast("献立と買い物リストを作成しました");
}

function reroll(d){
  state.plan[d]=swapDay(state.plan,d);
  state.checked={};
  renderPlan(); renderShop();
  toast("DAY"+(d+1)+"を入れ替えました");
}

function toggleIng(d){
  state.openIng[d]=!state.openIng[d];
  document.getElementById("ing"+d).classList.toggle("on",!!state.openIng[d]);
}

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const STAG={"準備":"stag-p","副菜":"stag-s","主菜":"stag-m","仕上げ":"stag-f"};
function stepsHtml(r){
  return (r.st||[]).map(s=>{
    const m=s.match(/^【(.+?)】(.*)$/);
    const tag=m?m[1]:"", body=m?m[2]:s;
    return `<li><span class="stag ${STAG[tag]||"stag-p"}">${esc(tag)}</span><span>${esc(body)}</span></li>`;
  }).join("");
}

      </div>
      <div class="menu-main">${esc(r.main)}</div>

      <div class="nutri">
        <span class="chip"><b>${r.n[0]}</b> kcal</span>
        <span class="chip">たんぱく質 <b>${r.n[1]}g</b></span>
        <span class="chip">脂質 <b>${r.n[2]}g</b></span>
        <span class="chip">炭水化物 <b>${r.n[3]}g</b></span>
        <span class="chip">塩分 <b>${r.n[4]}g</b></span>
        <span class="chip">野菜 <b>${r.n[5]}g</b></span>
      </div>
      ${j.notes.length?`<div class="nutri"><span class="chip" style="background:#fff8e1;color:#a06000">💡 ${esc(j.notes.join("・"))}</span></div>`:""}
      <button class="ing-toggle" onclick="toggleIng(${d})">食材と作り方を見る(${state.people}人前) ▾</button>
      <div class="ing-list ${state.openIng[d]?"on":""}" id="ing${d}"><ul>${ings}
        <li class="ssn">調味料: ${esc(r.ssn.join("・"))}</li></ul>

        <div class="ssn">💡 野菜を先にすべて切ってから肉・魚を扱う順番なので、まな板の洗い直しが最小限で済みます。</div>
      </div>
    </div>`;
  });
  // 週サマリー
  const s=weekSummary(state.plan);
  const a=s.avg;
  html+=`<div class="card">
    <div class="sum-title">📊 ${state.days}食分の平均栄養(1人前・ごはん抜き)</div>
    <div class="nutri">

      <span class="chip">たんぱく質 <b>${a[1].toFixed(1)}g</b></span>
      <span class="chip">脂質 <b>${a[2].toFixed(1)}g</b></span>
      <span class="chip">炭水化物 <b>${a[3].toFixed(1)}g</b></span>
      <span class="chip">塩分 <b>${a[4].toFixed(1)}g</b></span>
      <span class="chip">野菜 <b>${Math.round(a[5])}g</b></span>
    </div>
    <div class="pfc-bar">
      <div class="pfc-p" style="width:${s.pfc[0]}%"></div>
      <div class="pfc-f" style="width:${s.pfc[1]}%"></div>
      <div class="pfc-c" style="width:${s.pfc[2]}%"></div>
    </div>
    <div class="pfc-legend">

      <span><i class="pfc-f"></i>F ${Math.round(s.pfc[1])}%</span>
      <span><i class="pfc-c"></i>C ${Math.round(s.pfc[2])}%</span>
    </div>
    <div class="sum-note">ごはん普通盛り(約240kcal・炭水化物56g)を足すと1食 約${Math.round(a[0]+240)}kcalです。野菜は1日350gが目標なので、夕食で${Math.round(a[5])}gとれていれば朝昼で残りを補えばOK。</div>

  area.innerHTML=html;
}

function renderShop(){
  if(!state.plan)return;
  const area=document.getElementById("shopArea");
  const {cats,ssn}=buildShopping(state.plan,state.people);
  const allItems=Object.values(cats).flat();
  const total=allItems.length;
  const done=allItems.filter(it=>state.checked[it.name]).length;
  const catIcon={"野菜":"🥬","きのこ・海藻":"🍄","肉・魚":"🍖","卵・豆腐・乳":"🥚","その他":"🥫"};
  let html=`<div class="card">
    <div class="shop-head"><h2>🛒 買い物リスト</h2><span>${state.people}人 × ${state.days}食分</span></div>
    <div class="prog"><div style="width:${total?done/total*100:0}%"></div></div>
    <div style="font-size:11.5px;color:var(--sub)">${done} / ${total} 品 完了</div>`;
  for(const[cat,items]of Object.entries(cats)){
    if(!items.length)continue;
    html+=`<div class="cat-title">${catIcon[cat]} ${cat}</div>`;
    items.forEach(it=>{
      const ck=state.checked[it.name]?"checked":"";
      const lf=it.leftover>=Math.max(60,it.g*0.45)?`<small>⚠️ 約${Math.round(it.leftover)}g余ります → 翌週へ</small>`:"";
      html+=`<label class="item ${ck?"done":""}">
        <input type="checkbox" ${ck} onchange="chk('${esc(it.name)}')">
        <span class="nm">${esc(it.name)}${it.sub?`<small>${esc(it.sub)}</small>`:""}</span>
        <span class="qt">${esc(it.qty)}${lf}</span>
      </label>`;
    });
  }
  html+=`<div class="home-note">🏠 <b>ご家庭でご用意ください</b><br>ごはん／${esc(ssn.join("・"))}</div>
  <button class="copy-btn" onclick="copyList()">📋 リストをコピー(メモ・LINE共有用)</button>
  </div>`;
  area.innerHTML=html;
  const badge=document.getElementById("shopBadge");
  badge.style.display=total-done>0?"":"none";
  badge.textContent=total-done;
}

function chk(name){
  state.checked[name]=!state.checked[name];
  renderShop();
}

function copyList(){
  const {cats,ssn}=buildShopping(state.plan,state.people);
  let txt=`【買い物リスト】${state.people}人×${state.days}食分\n`;
  for(const[cat,items]of Object.entries(cats)){
    if(!items.length)continue;
    txt+=`\n■${cat}\n`;
    items.forEach(it=>{txt+=`□ ${it.name} ${it.qty}${it.sub?"("+it.sub+")":""}\n`;});
  }
  txt+=`\n■家にあるか確認\nごはん／${ssn.join("・")}\n`;
  txt+=`\n【献立】\n`;
  state.plan.forEach((ri,d)=>{txt+=`DAY${d+1}: ${RECIPES[ri].main} + ${RECIPES[ri].side}\n`;});
  navigator.clipboard.writeText(txt).then(()=>toast("コピーしました")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);
    ta.select();document.execCommand("copy");ta.remove();toast("コピーしました");
  });
}

function showTab(t){
  document.getElementById("pagePlan").classList.toggle("on",t==="Plan");
  document.getElementById("pageShop").classList.toggle("on",t==="Shop");
  document.getElementById("tabPlan").classList.toggle("on",t==="Plan");
  document.getElementById("tabShop").classList.toggle("on",t==="Shop");
  document.getElementById("ctrlCard").style.display=t==="Plan"?"":"none";
  window.scrollTo(0,0);
}

let toastTimer;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("on"),1800);
}
